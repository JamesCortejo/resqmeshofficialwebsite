<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="ResQMesh administrative access portal for registration review and system coordination.">
  <title>Admin Login - ResQMesh</title>

  <link rel="stylesheet" href="/admin/css/login.css">
  <link rel="stylesheet" href="/admin/css/admin-loader.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="admin-login-page admin-loading">
  <div class="admin-loader" aria-live="polite" aria-label="Loading ResQMesh admin">
    <div class="admin-loader-content">
      <span class="admin-loader-mark" aria-hidden="true"></span>
      <span>
        <span class="admin-loader-title">ResQMesh Admin</span>
        <span class="admin-loader-subtitle">Preparing admin workspace</span>
      </span>
    </div>
  </div>

  <main class="admin-shell">
    <section class="admin-card" aria-labelledby="admin-login-title">
      <a href="/" class="admin-logo-link" aria-label="Return to ResQMesh home">
        <img src="/assets/logo-icon.png" alt="ResQMesh Logo" class="admin-logo-icon">
        <div>
          <span class="admin-logo-title">RESQ-MESH</span>
          <span class="admin-logo-subtitle">Admin Access</span>
        </div>
      </a>

      <div class="admin-intro">
        <span class="admin-kicker">
          <i class="fa-solid fa-shield-halved" aria-hidden="true"></i>
          Valencia City Emergency Network
        </span>
        <h2 id="admin-login-title">Admin Login</h2>
        <p>
          Sign in to access the ResQMesh admin panel for system management, monitoring, and operational controls.
        </p>
      </div>

      <form id="admin-login-form" class="admin-form" novalidate>
        <div class="form-group">
          <label for="admin-username">Username <span aria-hidden="true">*</span></label>
          <div class="input-wrapper">
            <i class="fa-solid fa-user" aria-hidden="true"></i>
            <input type="text" id="admin-username" name="username" autocomplete="username"
              placeholder="Enter admin username">
          </div>
          <span class="form-error" id="username-error"></span>
        </div>

        <div class="form-group">
          <label for="admin-password">Password <span aria-hidden="true">*</span></label>
          <div class="input-wrapper">
            <i class="fa-solid fa-key" aria-hidden="true"></i>
            <input type="password" id="admin-password" name="password" autocomplete="current-password"
              placeholder="Enter admin password">
          </div>
          <span class="form-error" id="password-error"></span>
        </div>

        <button type="submit" class="admin-submit">
          <i class="fa-solid fa-right-to-bracket" aria-hidden="true"></i>
          Sign In
        </button>

        <div class="admin-message" id="admin-message" role="status" aria-live="polite"></div>
      </form>

      <a href="/" class="back-link">
        <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
        Back to public website
      </a>
    </section>
  </main>

  <script src="/admin/js/admin-loader.js"></script>
  <script>
    const form = document.getElementById('admin-login-form');
    const usernameInput = document.getElementById('admin-username');
    const passwordInput = document.getElementById('admin-password');
    const usernameError = document.getElementById('username-error');
    const passwordError = document.getElementById('password-error');
    const message = document.getElementById('admin-message');

    function setFieldState(input, errorElement, errorMessage) {
      input.classList.toggle('has-error', Boolean(errorMessage));
      errorElement.textContent = errorMessage;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();
      const usernameMessage = username ? '' : 'Username is required.';
      const passwordMessage = password ? '' : 'Password is required.';

      setFieldState(usernameInput, usernameError, usernameMessage);
      setFieldState(passwordInput, passwordError, passwordMessage);
      message.className = 'admin-message';

      if (usernameMessage || passwordMessage) {
        message.textContent = '';
        return;
      }

      try {
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });
        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.message || 'Invalid admin credentials.');
        }

        window.location.href = result.redirectTo || '/resqmeshadmin/overview';
      } catch (error) {
        message.classList.add('is-visible');
        message.textContent = error.message;
      }
    });

    [usernameInput, passwordInput].forEach((input) => {
      input.addEventListener('input', () => {
        const errorElement = input === usernameInput ? usernameError : passwordError;
        setFieldState(input, errorElement, '');
        message.className = 'admin-message';
        message.textContent = '';
      });
    });
  </script>
</body>

</html>

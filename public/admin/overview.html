<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ResQMesh admin overview workspace.">
  <title>Admin Overview - ResQMesh</title>

  <link rel="stylesheet" href="/admin/css/login.css">
  <link rel="stylesheet" href="/admin/css/overview.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="admin-login-page">
  <main class="overview-shell">
    <header class="overview-header">
      <a href="/resqmeshadmin/overview" class="admin-logo-link" aria-label="ResQMesh admin overview">
        <img src="/assets/logo-icon.png" alt="ResQMesh Logo" class="admin-logo-icon">
        <div>
          <span class="admin-logo-title">RESQ-MESH</span>
          <span class="admin-logo-subtitle">Admin Overview</span>
        </div>
      </a>
      <a href="/resqmeshadmin" class="back-link">
        <i class="fa-solid fa-arrow-right-from-bracket" aria-hidden="true"></i>
        Back to login
      </a>
    </header>

    <section class="overview-panel" aria-labelledby="overview-title">
      <span class="admin-kicker">
        <i class="fa-solid fa-gauge-high" aria-hidden="true"></i>
        Valencia City Emergency Network
      </span>
      <h1 id="overview-title">Overview</h1>
      <p>This admin workspace is ready for future controls.</p>
    </section>
  </main>
</body>

</html>
